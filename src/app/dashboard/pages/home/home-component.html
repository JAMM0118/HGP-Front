<div class="size-full flex bg-slate-950 text-slate-100">
  <!-- Sidebar -->
  <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col">
    <div class="p-6 border-b border-slate-800">
      <h1 class="font-semibold text-xl text-white">PropPredict</h1>
      <p class="text-xs text-slate-400 mt-1">Inteligencia Inmobiliaria</p>
    </div>
    <nav class="flex-1 p-4">
      <button *ngFor="let item of navigationItems" (click)="activeModule = item.id" [class]="'w-full flex items-center gap-3 px-4 py-3 rounded-lg mb-1 transition-colors ' +
              (activeModule === item.id
                ? 'bg-blue-600 text-white'
                : 'text-slate-400 hover:bg-slate-800 hover:text-slate-200')">
        <i [class]="item.icon + ' w-5 h-5'"></i>
        <span class="text-sm">
          {{ item.label }}
        </span>
      </button>
    </nav>
    <div class="p-4 border-t border-slate-800">
      <div class="text-xs text-slate-500">
        <div>Versión del Modelo: v2.4.1</div>
        <div class="mt-1">Última Actualización: Abr 2026</div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Top Bar -->
    <header class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6">
      <div>
        <h2 class="text-lg font-medium text-white">
          {{ getCurrentModuleLabel() }}
        </h2>
        <p class="text-xs text-slate-400">Análisis del Mercado Inmobiliario de Colombia</p>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-right">
          <div class="text-xs text-slate-400">Rango de Datos</div>
          <div class="text-sm text-slate-200">2022 - 2025</div>
        </div>
        <div
          class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-sm font-medium">
          AD
        </div>
      </div>
    </header>

    <!-- Module Content -->
    <div class="flex-1 overflow-auto p-6 bg-slate-950">
      <app-executive-summary *ngIf="activeModule === 'executive'"></app-executive-summary>
      <app-exploratory-analytics *ngIf="activeModule === 'analytics'"></app-exploratory-analytics>
      <app-geospatial-intelligence *ngIf="activeModule === 'geospatial'"></app-geospatial-intelligence>
      <app-predictive-modelling *ngIf="activeModule === 'prediction'"></app-predictive-modelling>
      <app-ml-performance *ngIf="activeModule === 'ml-performance'"></app-ml-performance>
      <app-ai-insights *ngIf="activeModule === 'insights'"></app-ai-insights>
      <app-data-table *ngIf="activeModule === 'data-table'"></app-data-table>
    </div>
  </main>
</div>
